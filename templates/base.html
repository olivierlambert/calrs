<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}calrs{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --surface: #fff;
      --surface-hover: #fafafa;
      --text: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --border: #e4e4e7;
      --border-hover: #a1a1aa;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-subtle: #eff6ff;
      --accent-border: #bfdbfe;
      --accent-muted: #93c5fd;
      --success: #16a34a;
      --error-bg: #fef2f2;
      --error-text: #dc2626;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --surface: #18181b;
        --surface-hover: #27272a;
        --text: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --border: #27272a;
        --border-hover: #52525b;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --accent-subtle: rgba(59,130,246,0.1);
        --accent-border: rgba(59,130,246,0.25);
        --accent-muted: #1e40af;
        --success: #22c55e;
        --error-bg: rgba(220,38,38,0.1);
        --error-text: #f87171;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-lg: 0 4px 6px rgba(0,0,0,0.25);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.925rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
    }
    .meta span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Week navigation */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .week-nav .range {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .week-nav .nav-links {
      display: flex;
      gap: 0.5rem;
    }
    .week-nav a, .week-nav span.disabled {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .week-nav a {
      color: var(--text-secondary);
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .week-nav a:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    .week-nav span.disabled {
      color: var(--text-muted);
      border: 1px solid var(--border);
      background: var(--surface);
      opacity: 0.4;
      cursor: default;
    }

    /* Day groups */
    .day { margin-bottom: 1.5rem; }
    .day:last-child { margin-bottom: 0; }
    .day-label {
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .slots { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .slot-btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .slot-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-subtle);
      box-shadow: var(--shadow);
    }

    /* Form */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.375rem;
      font-size: 0.875rem;
      color: var(--text);
    }
    .form-group .hint {
      color: var(--text-muted);
      font-weight: 400;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.925rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }
    .form-group input::placeholder, .form-group textarea::placeholder {
      color: var(--text-muted);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: -0.01em;
    }
    .btn:hover { background: var(--accent-hover); box-shadow: var(--shadow-lg); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { background: var(--accent-muted); cursor: not-allowed; }

    /* Confirmation */
    .check {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: var(--success);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1rem;
    }

    .detail { margin-bottom: 0.625rem; color: var(--text-secondary); font-size: 0.925rem; }
    .detail strong { color: var(--text); }

    .empty { color: var(--text-muted); text-align: center; padding: 2.5rem 1rem; }

    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo img { max-height: 80px; max-width: 280px; object-fit: contain; }

    .powered {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 1.5rem;
    }
    .powered a { color: var(--text-muted); text-decoration: none; }
    .powered a:hover { color: var(--text-secondary); }

    .error {
      color: var(--error-text);
      background: var(--error-bg);
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    /* Selected slot summary */
    .selected-summary {
      background: var(--accent-subtle);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.925rem;
      font-weight: 500;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
      transition: color 0.15s ease;
    }
    .back-link:hover { color: var(--text); }

    .meta { flex-wrap: wrap; }
    .week-nav .range { min-width: 0; }

    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem; }
      .card { padding: 1.25rem; }
      .week-nav { flex-wrap: wrap; gap: 0.5rem; }
      .week-nav .range { font-size: 0.8rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% if impersonating %}
  <div style="position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #f59e0b; color: #000; text-align: center; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
    <span>You are impersonating <strong>{{ impersonating_name }}</strong></span>
    <form method="post" action="/dashboard/admin/stop-impersonate" style="margin: 0; display: inline;">
      <button type="submit" style="background: #000; color: #fff; border: none; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer;">Stop impersonating</button>
    </form>
  </div>
  <div style="height: 2.5rem;"></div>
  {% endif %}
  <div class="container">
    {% block content %}{% endblock %}
    <p class="powered">Powered by <a href="https://github.com/olivierlambert/calrs">calrs</a></p>
  </div>
</body>
</html>
