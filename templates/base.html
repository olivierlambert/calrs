<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}calrs{% endblock %}</title>
  <script>
  // Apply theme ASAP to avoid flash
  (function(){var t=localStorage.getItem('calrs_theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4f5;
      --surface: #fff;
      --surface-hover: #fafafa;
      --text: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --border: #e4e4e7;
      --border-hover: #a1a1aa;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-subtle: #eff6ff;
      --accent-border: #bfdbfe;
      --accent-muted: #93c5fd;
      --success: #16a34a;
      --error-bg: #fef2f2;
      --error-text: #dc2626;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
      --radius: 10px;
      --radius-lg: 14px;
    }

    html.dark {
      --bg: #09090b;
      --surface: #18181b;
      --surface-hover: #27272a;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border: #27272a;
      --border-hover: #52525b;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-subtle: rgba(59,130,246,0.1);
      --accent-border: rgba(59,130,246,0.25);
      --accent-muted: #1e40af;
      --success: #22c55e;
      --error-bg: rgba(220,38,38,0.1);
      --error-text: #f87171;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 6px rgba(0,0,0,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.925rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
    }
    .meta span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Week navigation */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .week-nav .range {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .week-nav .nav-links {
      display: flex;
      gap: 0.5rem;
    }
    .week-nav a, .week-nav span.disabled {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .week-nav a {
      color: var(--text-secondary);
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .week-nav a:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    .week-nav span.disabled {
      color: var(--text-muted);
      border: 1px solid var(--border);
      background: var(--surface);
      opacity: 0.4;
      cursor: default;
    }

    /* Day groups */
    .day { margin-bottom: 1.5rem; }
    .day:last-child { margin-bottom: 0; }
    .day-label {
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .slots { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .slot-btn {
      display: inline-block;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .slot-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-subtle);
      box-shadow: var(--shadow);
      transform: scale(1.03);
    }
    .slot-btn:active {
      transform: scale(0.97);
      box-shadow: none;
    }

    /* Form */
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.375rem;
      font-size: 0.875rem;
      color: var(--text);
    }
    .form-group .hint {
      color: var(--text-muted);
      font-weight: 400;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.925rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }
    .form-group input::placeholder, .form-group textarea::placeholder {
      color: var(--text-muted);
    }
    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s ease;
      letter-spacing: -0.01em;
    }
    .btn:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); box-shadow: var(--shadow-lg); }
    .btn:active { transform: scale(0.97); box-shadow: none; }
    .btn:disabled { background: var(--accent-muted); cursor: not-allowed; }

    /* Confirmation */
    .check {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: var(--success);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1rem;
    }

    .detail { margin-bottom: 0.625rem; color: var(--text-secondary); font-size: 0.925rem; }
    .detail strong { color: var(--text); }

    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 2.5rem 1rem;
    }
    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.5;
    }
    .empty-text {
      font-size: 0.925rem;
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo img { max-height: 80px; max-width: 280px; object-fit: contain; }

    .powered {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 1.5rem;
    }
    .powered a { color: var(--text-muted); text-decoration: none; }
    .powered a:hover { color: var(--text-secondary); }

    .error {
      color: var(--error-text);
      background: var(--error-bg);
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    /* Selected slot summary */
    .selected-summary {
      background: var(--accent-subtle);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-size: 0.925rem;
      font-weight: 500;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
      transition: color 0.15s ease;
    }
    .back-link:hover { color: var(--text); }

    .meta { flex-wrap: wrap; }
    .week-nav .range { min-width: 0; }

    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem; }
      .card { padding: 1.25rem; }
      .week-nav { flex-wrap: wrap; gap: 0.5rem; }
      .week-nav .range { font-size: 0.8rem; }
    }

    /* Interactive card hover lift */
    a.card {
      transition: border-color 0.15s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    a.card:hover {
      border-color: var(--accent-border);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    /* Status badges */
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      letter-spacing: 0.02em;
      vertical-align: middle;
    }
    .badge-disabled {
      background: var(--error-bg);
      color: var(--error-text);
    }
    .badge-pending {
      background: rgba(245, 158, 11, 0.12);
      color: #d97706;
    }
    .badge-confirmed {
      background: rgba(22, 163, 74, 0.1);
      color: var(--success);
    }
    .badge-requires {
      background: rgba(245, 158, 11, 0.12);
      color: #d97706;
    }

    /* Checkmark animation */
    @keyframes checkPop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .check {
      animation: checkPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
  <link rel="stylesheet" href="/accent.css">
  {% block head %}{% endblock %}
</head>
<body>
  {% if impersonating %}
  <div style="position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #f59e0b; color: #000; text-align: center; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
    <span>You are impersonating <strong>{{ impersonating_name }}</strong></span>
    <form method="post" action="/dashboard/admin/stop-impersonate" style="margin: 0; display: inline;">
      <button type="submit" style="background: #000; color: #fff; border: none; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer;">Stop impersonating</button>
    </form>
  </div>
  <div style="height: 2.5rem;"></div>
  {% endif %}
  <div class="container">
    {% block content %}{% endblock %}
    {% block footer %}<div class="powered" style="display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
      <span>Powered by <a href="https://cal.rs">calrs</a> 🦀</span>
      <button id="theme-toggle" type="button" title="Toggle theme" style="background: none; border: 1px solid var(--border); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--text-muted); transition: all 0.15s ease;" aria-label="Toggle theme">
        <span id="theme-icon"></span>
      </button>
    </div>{% endblock %}
  </div>
<script>
// CSRF protection: inject _csrf hidden field into all POST forms
(function() {
  function getCsrfToken() {
    var match = document.cookie.match(/(?:^|;\s*)calrs_csrf=([^;]+)/);
    return match ? match[1] : '';
  }
  function injectCsrf() {
    var token = getCsrfToken();
    if (!token) return;
    var forms = document.querySelectorAll('form[method="post"], form[method="POST"]');
    for (var i = 0; i < forms.length; i++) {
      var form = forms[i];
      if (form.querySelector('input[name="_csrf"]')) continue;
      // For multipart forms, add token to action URL as query param instead
      if (form.enctype === 'multipart/form-data') {
        var action = form.getAttribute('action') || '';
        var sep = action.indexOf('?') >= 0 ? '&' : '?';
        form.setAttribute('action', action + sep + '_csrf=' + encodeURIComponent(token));
        continue;
      }
      var input = document.createElement('input');
      input.type = 'hidden';
      input.name = '_csrf';
      input.value = token;
      form.appendChild(input);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectCsrf);
  } else {
    injectCsrf();
  }
})();
</script>
<script>
// Theme toggle (light / dark / system)
(function() {
  var btn = document.getElementById('theme-toggle');
  var icon = document.getElementById('theme-icon');
  if (!btn || !icon) return;
  function getTheme() { return localStorage.getItem('calrs_theme') || 'system'; }
  function isDark() {
    var t = getTheme();
    return t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme:dark)').matches);
  }
  function apply() {
    if (isDark()) {
      document.documentElement.classList.add('dark');
      icon.textContent = '\u2600\uFE0F'; // sun = click to go light
    } else {
      document.documentElement.classList.remove('dark');
      icon.textContent = '\uD83C\uDF19'; // moon = click to go dark
    }
  }
  btn.addEventListener('click', function() {
    var current = getTheme();
    var next;
    if (current === 'system') {
      next = isDark() ? 'light' : 'dark';
    } else {
      // If user picked something, check if system matches — if so, go back to system
      var systemDark = matchMedia('(prefers-color-scheme:dark)').matches;
      if ((current === 'dark' && !systemDark) || (current === 'light' && systemDark)) {
        next = current === 'dark' ? 'light' : 'dark';
      } else {
        next = 'system';
      }
    }
    if (next === 'system') {
      localStorage.removeItem('calrs_theme');
    } else {
      localStorage.setItem('calrs_theme', next);
    }
    apply();
  });
  apply();
  // Listen for system changes when set to 'system'
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change', function() {
    if (getTheme() === 'system') apply();
  });
})();
</script>
</body>
</html>
