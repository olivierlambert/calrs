name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  templates:
    name: Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check templates for unclosed blocks
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            opens=$(grep -c '{%[- ]*block ' "$f" || true)
            closes=$(grep -c '{%[- ]*endblock' "$f" || true)
            if [ "$opens" != "$closes" ]; then
              echo "Unbalanced block/endblock in $f (block: $opens, endblock: $closes)"
              fail=1
            fi
          done < <(find templates -name '*.html' -print0)
          exit $fail

  check:
    name: Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings
      - run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        run: cargo tarpaulin --out xml --skip-clean
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
